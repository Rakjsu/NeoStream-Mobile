name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Testes de unidade
        run: npm test
      - name: Lint
        run: npm run lint -- --max-warnings 0
      - name: Smoke test do bundle Android
        run: npx expo export --platform android --output-dir dist-smoke
      - name: Guarda do bundle (existe + tamanho são)
        shell: bash
        run: |
          BUNDLE=$(find dist-smoke -name '*.hbc' -o -name '*.bundle' | head -1)
          test -n "$BUNDLE" || { echo '::error::bundle não encontrado no export'; exit 1; }
          SIZE=$(stat -c%s "$BUNDLE")
          echo "bundle: $BUNDLE ($SIZE bytes)"
          test "$SIZE" -gt 1000000 || { echo '::error::bundle suspeito de vazio (<1MB)'; exit 1; }
          test "$SIZE" -lt 26214400 || { echo '::error::bundle inflou (>25MB) — investigar deps novas'; exit 1; }
